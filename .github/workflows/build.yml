name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ]
  # This line allows you to trigger the build manually from the GitHub website
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Best compatibility for PyQT6 and PyInstaller
        cache: 'pip'

    - name: Install Dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install --default-timeout=1000 --retries=10 -r requirements.txt || pip install --default-timeout=1000 --retries=10 -r requirements.txt
        pip install pyinstaller

    - name: Create Secure .env File
      # We dynamically create the .env file using GitHub Secrets so it's never hardcoded in your repository
      run: |
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
        echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
        echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> .env
      shell: bash

    - name: Run Build Pipeline
      # This runs the build_exe.py script we created earlier
      env:
        PYTHONIOENCODING: "utf8"
      run: python build_tools/build_exe.py

    - name: Upload Finished Build
      uses: actions/upload-artifact@v4
      with:
        name: DataProcessor_Windows_Release
        path: dist_output/DataProcessor_v1.0.0.zip
        retention-days: 7
